spring:
  application:
    name: quan-ly-sinh-vien-v2
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: "${DB_URL:jdbc:mysql://localhost:3306/quan-ly-sinh-vien-v2}"
    username: "${DB_USERNAME:root}"
    password: "${DB_PASSWORD:root}"
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  docker:
    compose:
      enabled: false
  mail:
    host: "${MAIL_HOST:smtp.gmail.com}"
    port: "${MAIL_PORT:587}"
    username: "${MAIL_USERNAME:}"
    password: "${MAIL_PASSWORD:}"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: smtp.gmail.com

minio:
  url: "${MINIO_URL:http://localhost:9000}"
  access-key: "${MINIO_ACCESS_KEY:admin}"
  secret-key: "${MINIO_SECRET_KEY:12345678}"
  bucket: "${MINIO_BUCKET:avatar-image}"
  public-url: "${MINIO_PUBLIC_URL:http://localhost:9000}"

logging:
  level:
    com.example.quan_ly_sinh_vien: DEBUG
  pattern:
    console: "%highlight(%-5level) %cyan(%logger{36}) - %msg%n"

momo:
  partner-code: "${MOMO_PARTNER_CODE:}"
  access-key: "${MOMO_ACCESS_KEY:}"
  secret-key: "${MOMO_SECRET_KEY:}"
  endpoint: "${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api}"
  redirect-url: "${MOMO_REDIRECT_URL:http://localhost:8080/api/v2/payments/momo/return}"
  ipn-url: "${MOMO_IPN_URL:http://localhost:8080/api/v2/payments/momo/ipn}"
  request-type: "${MOMO_REQUEST_TYPE:captureWallet}"
  lang: "${MOMO_LANG:vi}"
  partner-name: "${MOMO_PARTNER_NAME:MOMO}"
  store-id: "${MOMO_STORE_ID:MOMO_STORE}"
